<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="PROXIMUS — open-source AI voice agent">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
  </g>

  <!-- waveform -->
  <g fill="url(#accent)" filter="url(#glow)" opacity="0.9">
    <rect x="120"  y="300" width="10" height="40"  rx="5"/>
    <rect x="150"  y="270" width="10" height="100" rx="5"/>
    <rect x="180"  y="240" width="10" height="160" rx="5"/>
    <rect x="210"  y="290" width="10" height="60"  rx="5"/>
    <rect x="240"  y="210" width="10" height="220" rx="5"/>
    <rect x="270"  y="280" width="10" height="80"  rx="5"/>
    <rect x="300"  y="250" width="10" height="140" rx="5"/>
    <rect x="330"  y="300" width="10" height="40"  rx="5"/>
  </g>

  <text x="120" y="470" font-family="Helvetica, Arial, sans-serif" font-size="120" font-weight="800" fill="#f8fafc" letter-spacing="4">PROXIMUS</text>
  <rect x="124" y="500" width="170" height="6" rx="3" fill="url(#accent)"/>
  <text x="120" y="556" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="500" fill="#94a3b8">Open-source real-time AI voice agent</text>
  <text x="120" y="600" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#64748b">LiveKit · Telnyx · Deepgram · Claude / GPT · Cartesia</text>
</svg>
